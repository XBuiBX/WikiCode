      overflow:hidden;
    }

      font-weight:800;
      margin-bottom:25px;
      color:#60a5fa;
      letter-spacing: -0.5px;
    }

    .search{
      width:100%;
      padding:12px 16px;
      border-radius:10px;
      border:none;
      outline:none;
      background:#111827;
      color:white;
      font-size:15px;
      margin-bottom:20px;
      transition: all 0.3s ease;
    }
    .search:focus{
      background:#1e2937;
      box-shadow: 0 0 0 3px rgba(96, 165, 250, 0.4);
    }

    .lang-item{
      padding:13px 16px;
      border-radius:10px;
      cursor:pointer;
      margin-bottom:6px;
      transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      opacity: 0;
      transform: translateX(-25px);
      animation: slideIn 0.5s forwards;
    }

    .lang-item:hover{
      background:#1f2937;
      transform: translateX(10px) scale(1.04);
      box-shadow: 0 12px 25px rgba(0, 0, 0, 0.35);
    }

    @keyframes slideIn {
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .main{
      margin-left:260px;
      padding:40px 30px;
      width:100%;
      overflow-y:auto;
      height:100vh;
    }

    .card{
      background:#111827;
      padding:35px;
      border-radius:18px;
      box-shadow:0 15px 40px rgba(0,0,0,0.45);
      max-width:1150px;
      opacity: 0;
      transform: scale(0.94) translateY(40px);
      animation: cardPop 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }

    @keyframes cardPop {
      to {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }

    .card:hover {
      box-shadow: 0 25px 50px rgba(96, 165, 250, 0.18);
      transform: translateY(-6px);
      transition: all 0.4s ease;
    }

    .flex{display:flex;gap:35px;flex-wrap:wrap;}

    .infobox{
      width:320px;
      background:#0f172a;
      padding:24px;
      border-radius:14px;
      border:1px solid #1f2937;
      height:fit-content;
      transition: all 0.4s ease;
    }

    .infobox:hover {
      transform: translateY(-8px);
      box-shadow: 0 15px 30px rgba(0,0,0,0.3);
    }

    .infobox img{
      width:100%;
      height:150px;
      object-fit:contain;
      margin-bottom:20px;
      transition: transform 0.6s ease;
    }

    .infobox:hover img {
      transform: scale(1.12) rotate(3deg);
    }

    h1,h2,h3{color:#93c5fd; margin-top:0;}
    h1{font-size:2.4rem;}

    button{
      padding:12px 24px;
      border:none;
      border-radius:10px;
      background:#3b82f6;
      color:white;
      cursor:pointer;
      margin-bottom:30px;
      font-size:15px;
      font-weight:600;
      transition: all 0.3s ease;
    }

    button:hover{
      background:#2563eb;
      transform: translateY(-3px) scale(1.05);
      box-shadow: 0 10px 20px rgba(59, 130, 246, 0.5);
    }

    .section{
      margin-top:38px;
      opacity: 0;
      transform: translateY(25px);
      animation: sectionFade 0.7s forwards;
    }

    .section h3{
      margin-bottom:14px;
      position:relative;
      display:inline-block;
    }
    .section h3::after{
      content:'';
      position:absolute;
      bottom:-6px;
      left:0;
      width:50px;
      height:3px;
      background:linear-gradient(90deg, #60a5fa, #3b82f6);
      border-radius:3px;
    }

    @keyframes sectionFade {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

      color:#f87171;

function renderList(){
  const list = document.getElementById("list");
  list.innerHTML = "";
  languages.forEach((l, index) => {
    const div = document.createElement("div");
    div.className = "lang-item";
    div.style.animationDelay = `${index * 0.035}s`;
    div.innerText = l.name;
    div.onclick = () => openLang(l);
    list.appendChild(div);
  });
}

function filterList(val){
  const list = document.getElementById("list");
  list.innerHTML = "";
  const filtered = languages.filter(l => l.name.toLowerCase().includes(val.toLowerCase()));
  filtered.forEach((l, index) => {
    const div = document.createElement("div");
    div.className = "lang-item";
    div.style.animationDelay = `${index * 0.035}s`;
    div.innerText = l.name;
    div.onclick = () => openLang(l);
    list.appendChild(div);
  });
}

          <h3>Информация</h3>
          <p><b>Название:</b> ${l.name}</p>
          <p><b>Тип:</b> Язык программирования</p>
          <p><b>Парадигма:</b> Многопарадигменный</p>
        </div>

    </div>
  `;
}

renderList();
</script>
